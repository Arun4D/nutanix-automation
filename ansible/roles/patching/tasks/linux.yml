---
- name: Upgrade all packages (YUM/DNF)
  ansible.builtin.package:
    name: "*"
    state: latest
  register: patch_result_rh
  when: ansible_os_family == 'RedHat'
  
- name: Upgrade all packages (APT)
  ansible.builtin.apt:
    upgrade: dist
    update_cache: yes
  register: patch_result_deb
  when: ansible_os_family == 'Debian'

- name: Check if reboot is required (Debian/Ubuntu)
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file
  when: ansible_os_family == 'Debian'

- name: Reboot server if necessary
  ansible.builtin.reboot:
  when: (ansible_os_family == 'Debian' and reboot_required_file.stat.exists) or (ansible_os_family == 'RedHat' and patch_result_rh.changed)
