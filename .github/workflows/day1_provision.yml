name: Day 1 Provisioning
on:
  repository_dispatch:
    types: [provision_vm]
  workflow_dispatch:
    inputs:
      ritm_id:
        description: 'ServiceNow RITM ID'
        required: true
      vm_name:
        description: 'Target VM Name'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Nutanix OS Build (Ubuntu)
        working-directory: ./packer/ubuntu2204
        run: |
          packer init .
          packer validate .

      - name: Nutanix OS Build (RHEL 9)
        working-directory: ./packer/rhel9
        run: |
          packer init .
          packer validate .

      - name: Nutanix OS Build (Windows 2022)
        working-directory: ./packer/windows2022
        run: |
          packer init .
          packer validate .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init & Apply
        working-directory: ./terraform/vms
        run: |
          terraform init
          terraform apply -auto-approve -var-file="environments/dev.tfvars" -var="vm_name=${{ github.event.client_payload.vm_name || github.event.inputs.vm_name }}"

      - name: Update CMDB
        env:
          SNOW_INSTANCE_URL: ${{ secrets.SNOW_INSTANCE_URL }}
          SNOW_USER: ${{ secrets.SNOW_USER }}
          SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
        run: |
          pip install requests
          python scripts/snow_updater.py "${{ github.event.client_payload.vm_name || github.event.inputs.vm_name }}" "SUCCESS"
