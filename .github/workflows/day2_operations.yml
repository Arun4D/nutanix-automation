name: Day 2 Remediation
on:
  repository_dispatch:
    types: [remediate_alert]

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Assess & Execute OS Patching
        if: ${{ github.event.client_payload.action == 'patch_os' }}
        run: |
          ansible-playbook -i ansible/inventories/dynamic_snow.py ansible/roles/patching/playbook.yml

      - name: Assess & Execute Scaling
        if: ${{ github.event.client_payload.action == 'scale_up' }}
        working-directory: ./terraform
        run: |
          echo "Scaling VM: ${{ github.event.client_payload.vm_name }}"
          terraform init
          terraform apply -auto-approve -var-file="environments/prod.tfvars" -var="vm_name=${{ github.event.client_payload.vm_name }}" -var="num_vcpus_per_socket=4"
