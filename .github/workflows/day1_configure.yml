name: Day 1 Configuration
on:
  repository_dispatch:
    types: [configure_vm]

jobs:
  config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run Ansible Configuration
        run: |
          ansible-playbook -i ansible/inventories/dynamic_snow.py ansible/roles/os_baseline/playbook.yml
          ansible-playbook -i ansible/inventories/dynamic_snow.py ansible/roles/app_deploy/playbook.yml
